# ==============================================
# TradePulse - Configuração da Estratégia
# ==============================================

# Exchange padrão: binance | bybit
exchange: binance

# Par de negociação
symbol: BTC/USDT

# Timeframe das velas (1m, 5m, 15m, 1h, 4h, 1d)
timeframe: 1h

# Quantidade de velas para análise
candle_limit: 200

# --- Estratégia: Cruzamento de Médias Móveis + RSI ---
strategy:
  # Média móvel curta (períodos)
  short_ma_period: 9
  # Média móvel longa (períodos)
  long_ma_period: 21
  # Tipo de média: sma | ema
  ma_type: ema
  # Período do RSI
  rsi_period: 14
  # RSI acima deste valor confirma venda (sobrecompra)
  rsi_overbought: 70
  # RSI abaixo deste valor confirma compra (sobrevenda)
  rsi_oversold: 30

# --- Gestão de Risco ---
risk:
  # Percentual máximo do saldo por operação (ex: 0.02 = 2%)
  max_risk_per_trade: 0.02
  # Stop-loss em percentual (ex: 0.02 = 2%)
  stop_loss_pct: 0.02
  # Take-profit em percentual (ex: 0.04 = 4%)
  take_profit_pct: 0.04
  # Limite de perda diária em USDT
  daily_loss_limit: 50.0
  # Meta de ganho diário em USDT (desativa auto-trade ao atingir)
  daily_profit_target: 20.0
  # Número máximo de operações por dia
  max_trades_per_day: 10

# --- Scalping ---
scalping:
  # Ativar modo scalping por padrão
  enabled: false
  # Take-profit fixo em USDT (fechar posição ao atingir esse lucro)
  take_profit_usd: 3.0
  # Stop-loss fixo em USDT (fechar posição ao atingir essa perda)
  stop_loss_usd: 2.0
  # EMA curta para micro-tendência
  short_ma_period: 3
  # EMA longa para micro-tendência
  long_ma_period: 8
  # EMA de tendência macro (filtro direcional - só compra se preço acima desta)
  trend_ma_period: 50
  # RSI rápido
  rsi_period: 7
  # Score mínimo para abrir posição (máximo possível: 10)
  # Cada indicador contribui 1 ponto, golden cross dá +2 bônus
  # 5 = equilibrado, 4 = mais agressivo, 6 = mais conservador
  min_score: 5
  # Ciclos de cooldown após um Stop-Loss (evita re-entrada imediata)
  cooldown_after_sl: 6
  # Intervalo de verificação em segundos
  check_interval: 5
  # Limite de operações por dia
  max_trades_per_day: 200
  # Percentual do saldo por operação de scalping (ex: 0.20 = 20%)
  risk_per_trade: 0.20

# --- Predição ML (XGBoost) ---
ml:
  # Ativar/desativar camada de predição ML
  enabled: true
  # Probabilidade mínima de alta para permitir BUY (0.0 a 1.0)
  # 0.55 = 55% de confiança → filtro moderado
  min_probability: 0.55
  # Re-treinar modelo a cada N ciclos de análise
  retrain_interval: 50
  # Quantidade de velas para treinamento
  lookback_candles: 500
  # Horizonte de predição: prever movimento das próximas N velas
  prediction_horizon: 3

# --- Execução ---
execution:
  # Tipo de ordem: market | limit
  order_type: market
  # Intervalo entre verificações (segundos)
  check_interval: 60

# --- Backtest ---
backtest:
  # Saldo inicial para simulação
  initial_balance: 10000.0
  # Taxa de comissão (ex: 0.001 = 0.1%)
  commission: 0.001

# --- Logging ---
logging:
  # Nível: DEBUG | INFO | WARNING | ERROR
  level: INFO
  # Diretório dos logs
  log_dir: logs
